name: Vercel Preview Deployment

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        id: vercel-preview
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Vercel Preview Deployed\n\nPreview URL: ${{ steps.vercel-preview.outputs.preview-url }}\n\n**Routes to verify:**\n- [Home](${process.env.PREVIEW_URL}/)\n- [Chat](${process.env.PREVIEW_URL}/chat)\n- [Tasks](${process.env.PREVIEW_URL}/tasks)\n- [Search](${process.env.PREVIEW_URL}/search)\n- [Settings](${process.env.PREVIEW_URL}/settings)`,
            })
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.preview-url }}
